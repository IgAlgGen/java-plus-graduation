server.port=8080

management.endpoints.web.exposure.include=*

eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=main-service-admin-user-comments-api
spring.cloud.gateway.routes[0].uri=lb://main-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/admin/users/*/events/*/comments,/admin/users/*/comments/*

spring.cloud.gateway.routes[1].id=user-service-api
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/admin/users/**

spring.cloud.gateway.routes[2].id=main-service-event-comments-api
spring.cloud.gateway.routes[2].uri=lb://main-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/events/*/comments

spring.cloud.gateway.routes[3].id=request-service-api
spring.cloud.gateway.routes[3].uri=lb://request-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/users/*/requests,/users/*/requests/**,/users/*/events/*/requests

spring.cloud.gateway.routes[4].id=feature-service-category-api
spring.cloud.gateway.routes[4].uri=lb://feature-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/categories,/categories/**,/admin/categories,/admin/categories/**

spring.cloud.gateway.routes[5].id=event-service-api
spring.cloud.gateway.routes[5].uri=lb://event-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/events,/events/*,/admin/events/**,/users/*/events,/users/*/events/*

spring.cloud.gateway.routes[6].id=main-service-api
spring.cloud.gateway.routes[6].uri=lb://main-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/admin/**,/users/**,/events/**,/categories/**,/compilations/**,/comments/**
