x-actuator-healthcheck: &actuator-healthcheck
  test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/$${SERVER_PORT}; printf \"GET /actuator/health HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n\" >&3; cat <&3 | grep -q \"\\\"status\\\":\\\"UP\\\"\"'"]
  interval: 5s
  timeout: 5s
  retries: 20
  start_period: 20s

services:

  discovery-server:
    build:
      context: .
      dockerfile: infra/discovery-server/Dockerfile
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/8761'"]
      interval: 5s
      timeout: 3s
      retries: 10

  config-server:
    build:
      context: .
      dockerfile: infra/config-server/Dockerfile
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/8888'"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: on-failure

  kafka:
    image: apache/kafka:3.7.2
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      CLUSTER_ID: abcdefghijklmnopqrstuv
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  kafka-init:
    image: apache/kafka:3.7.2
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic stats.user-actions.v1 --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic stats.events-similarity.v1 --partitions 3 --replication-factor 1

  stats-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: stats
      POSTGRES_PASSWORD: ${STATS_DB_PASSWORD}
    volumes:
      - ./stats-service/stats-server/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stats"]
      interval: 5s
      retries: 5

  stats-server:
    build:
      context: .
      dockerfile: stats-service/stats-server/Dockerfile
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      stats-db:
        condition: service_healthy
    environment:
      SERVER_PORT: 9090
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://stats-db:5432/stats
      SPRING_DATASOURCE_USERNAME: stats
      SPRING_DATASOURCE_PASSWORD: ${STATS_DB_PASSWORD}
    healthcheck: *actuator-healthcheck

  analyzer-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: analyzer
      POSTGRES_USER: analyzer
      POSTGRES_PASSWORD: ${ANALYZER_DB_PASSWORD:-analyzer}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyzer -d analyzer"]
      interval: 5s
      retries: 5

  collector:
    build:
      context: .
      dockerfile: stats-service/collector/Dockerfile
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      SERVER_PORT: 9091
      GRPC_SERVER_PORT: 0
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    healthcheck: *actuator-healthcheck

  aggregator:
    build:
      context: .
      dockerfile: stats-service/aggregator/Dockerfile
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      SERVER_PORT: 9092
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    healthcheck: *actuator-healthcheck

  analyzer:
    build:
      context: .
      dockerfile: stats-service/analyzer/Dockerfile
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      analyzer-db:
        condition: service_healthy
    environment:
      SERVER_PORT: 9093
      GRPC_SERVER_PORT: 0
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://analyzer-db:5432/analyzer
      SPRING_DATASOURCE_USERNAME: analyzer
      SPRING_DATASOURCE_PASSWORD: ${ANALYZER_DB_PASSWORD:-analyzer}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    healthcheck: *actuator-healthcheck

  users-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: ewm-users
      POSTGRES_USER: users
      POSTGRES_PASSWORD: ${USERS_DB_PASSWORD}
    volumes:
      - ./core/user-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U users -d ewm-users"]
      interval: 5s
      retries: 5

  events-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: ewm-events
      POSTGRES_USER: events
      POSTGRES_PASSWORD: ${EVENTS_DB_PASSWORD}
    volumes:
      - ./core/event-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U events -d ewm-events"]
      interval: 5s
      retries: 5

  requests-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: ewm-requests
      POSTGRES_USER: requests
      POSTGRES_PASSWORD: ${REQUESTS_DB_PASSWORD}
    volumes:
      - ./core/request-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U requests -d ewm-requests"]
      interval: 5s
      retries: 5

  category-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: ewm-category
      POSTGRES_USER: category
      POSTGRES_PASSWORD: ${CATEGORY_DB_PASSWORD}
    volumes:
      - ./core/category-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U category -d ewm-category"]
      interval: 5s
      retries: 5

  compilation-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: ewm-compilation
      POSTGRES_USER: compilation
      POSTGRES_PASSWORD: ${COMPILATION_DB_PASSWORD}
    volumes:
      - ./core/compilation-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compilation -d ewm-compilation"]
      interval: 5s
      retries: 5

  comment-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: ewm-comment
      POSTGRES_USER: comment
      POSTGRES_PASSWORD: ${COMMENT_DB_PASSWORD}
    volumes:
      - ./core/comment-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comment -d ewm-comment"]
      interval: 5s
      retries: 5

  event-service:
    build:
      context: .
      dockerfile: core/event-service/Dockerfile
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      events-db:
        condition: service_healthy
      user-service:
        condition: service_healthy
      category-service:
        condition: service_healthy
      collector:
        condition: service_healthy
      analyzer:
        condition: service_healthy
    environment:
      SERVER_PORT: 8092
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://events-db:5432/ewm-events
      SPRING_DATASOURCE_USERNAME: events
      SPRING_DATASOURCE_PASSWORD: ${EVENTS_DB_PASSWORD}
      GRPC_CLIENT_COLLECTOR_ADDRESS: discovery:///collector
      GRPC_CLIENT_ANALYZER_ADDRESS: discovery:///analyzer
      USER_SERVICE_ID: user-service
      REQUEST_SERVICE_ID: request-service
      CATEGORY_SERVICE_ID: category-service
    healthcheck: *actuator-healthcheck

  category-service:
    build:
      context: .
      dockerfile: core/category-service/Dockerfile
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      category-db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8094
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://category-db:5432/ewm-category
      SPRING_DATASOURCE_USERNAME: category
      SPRING_DATASOURCE_PASSWORD: ${CATEGORY_DB_PASSWORD}
      EVENT_SERVICE_ID: event-service
    healthcheck: *actuator-healthcheck

  compilation-service:
    build:
      context: .
      dockerfile: core/compilation-service/Dockerfile
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      compilation-db:
        condition: service_healthy
      event-service:
        condition: service_healthy
    environment:
      SERVER_PORT: 8095
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://compilation-db:5432/ewm-compilation
      SPRING_DATASOURCE_USERNAME: compilation
      SPRING_DATASOURCE_PASSWORD: ${COMPILATION_DB_PASSWORD}
      EVENT_SERVICE_ID: event-service
    healthcheck: *actuator-healthcheck

  comment-service:
    build:
      context: .
      dockerfile: core/comment-service/Dockerfile
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      comment-db:
        condition: service_healthy
      user-service:
        condition: service_healthy
      event-service:
        condition: service_healthy
    environment:
      SERVER_PORT: 8096
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://comment-db:5432/ewm-comment
      SPRING_DATASOURCE_USERNAME: comment
      SPRING_DATASOURCE_PASSWORD: ${COMMENT_DB_PASSWORD}
      USER_SERVICE_ID: user-service
      EVENT_SERVICE_ID: event-service
    healthcheck: *actuator-healthcheck

  request-service:
    build:
      context: .
      dockerfile: core/request-service/Dockerfile
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      requests-db:
        condition: service_healthy
      user-service:
        condition: service_healthy
      event-service:
        condition: service_healthy
      collector:
        condition: service_healthy
      analyzer:
        condition: service_healthy
    environment:
      SERVER_PORT: 8093
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://requests-db:5432/ewm-requests
      SPRING_DATASOURCE_USERNAME: requests
      SPRING_DATASOURCE_PASSWORD: ${REQUESTS_DB_PASSWORD}
      GRPC_CLIENT_COLLECTOR_ADDRESS: discovery:///collector
      GRPC_CLIENT_ANALYZER_ADDRESS: discovery:///analyzer
      USER_SERVICE_ID: user-service
      EVENT_SERVICE_ID: event-service
    healthcheck: *actuator-healthcheck

  user-service:
    build:
      context: .
      dockerfile: core/user-service/Dockerfile
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      users-db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8091
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://users-db:5432/ewm-users
      SPRING_DATASOURCE_USERNAME: users
      SPRING_DATASOURCE_PASSWORD: ${USERS_DB_PASSWORD}
    healthcheck: *actuator-healthcheck

  gateway-server:
    build:
      context: .
      dockerfile: infra/gateway-server/Dockerfile
    entrypoint: ["sh", "-c", "sleep $${GATEWAY_STARTUP_DELAY:-20} && exec java -jar app.jar"]
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      event-service:
        condition: service_healthy
      request-service:
        condition: service_healthy
      category-service:
        condition: service_healthy
      compilation-service:
        condition: service_healthy
      comment-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      GATEWAY_STARTUP_DELAY: 20
      SERVER_PORT: 8080
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    healthcheck: *actuator-healthcheck
