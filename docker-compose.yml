x-actuator-healthcheck: &actuator-healthcheck
  test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/$${SERVER_PORT}; printf \"GET /actuator/health HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n\" >&3; cat <&3 | grep -q \"\\\"status\\\":\\\"UP\\\"\"'"]
  interval: 5s
  timeout: 5s
  retries: 20
  start_period: 20s

services:

  discovery-server:
    build:
      context: .
      dockerfile: infra/discovery-server/Dockerfile
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/8761'"]
      interval: 5s
      timeout: 3s
      retries: 10

  config-server:
    build:
      context: .
      dockerfile: infra/config-server/Dockerfile
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/8888'"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: on-failure

  stats-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: stats
      POSTGRES_PASSWORD: stats
    volumes:
      - ./stats-service/stats-server/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stats"]
      interval: 5s
      retries: 5

  stats-server:
    build:
      context: .
      dockerfile: stats-service/stats-server/Dockerfile
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      stats-db:
        condition: service_healthy
    environment:
      SERVER_PORT: 9090
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://stats-db:5432/stats
      SPRING_DATASOURCE_USERNAME: stats
      SPRING_DATASOURCE_PASSWORD: stats
    healthcheck: *actuator-healthcheck

  users-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: ewm-users
      POSTGRES_USER: users
      POSTGRES_PASSWORD: users
    volumes:
      - ./core/user-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U users -d ewm-users"]
      interval: 5s
      retries: 5

  events-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: ewm-events
      POSTGRES_USER: events
      POSTGRES_PASSWORD: events
    volumes:
      - ./core/event-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U events -d ewm-events"]
      interval: 5s
      retries: 5

  requests-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: ewm-requests
      POSTGRES_USER: requests
      POSTGRES_PASSWORD: requests
    volumes:
      - ./core/request-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U requests -d ewm-requests"]
      interval: 5s
      retries: 5

  feature-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: ewm-feature
      POSTGRES_USER: feature
      POSTGRES_PASSWORD: feature
    volumes:
      - ./core/feature-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feature -d ewm-feature"]
      interval: 5s
      retries: 5

  event-service:
    build:
      context: .
      dockerfile: core/event-service/Dockerfile
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      events-db:
        condition: service_healthy
      user-service:
        condition: service_healthy
      feature-service:
        condition: service_healthy
      stats-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8092
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://events-db:5432/ewm-events
      SPRING_DATASOURCE_USERNAME: events
      SPRING_DATASOURCE_PASSWORD: events
      STATS_SERVICE_ID: stats-server
      USER_SERVICE_ID: user-service
      REQUEST_SERVICE_ID: request-service
      FEATURE_SERVICE_ID: feature-service
    healthcheck: *actuator-healthcheck

  feature-service:
    build:
      context: .
      dockerfile: core/feature-service/Dockerfile
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      feature-db:
        condition: service_healthy
      user-service:
        condition: service_healthy
    environment:
      SERVER_PORT: 8094
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://feature-db:5432/ewm-feature
      SPRING_DATASOURCE_USERNAME: feature
      SPRING_DATASOURCE_PASSWORD: feature
      USER_SERVICE_ID: user-service
      EVENT_SERVICE_ID: event-service
    healthcheck: *actuator-healthcheck

  request-service:
    build:
      context: .
      dockerfile: core/request-service/Dockerfile
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      requests-db:
        condition: service_healthy
      user-service:
        condition: service_healthy
      event-service:
        condition: service_healthy
    environment:
      SERVER_PORT: 8093
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://requests-db:5432/ewm-requests
      SPRING_DATASOURCE_USERNAME: requests
      SPRING_DATASOURCE_PASSWORD: requests
      USER_SERVICE_ID: user-service
      EVENT_SERVICE_ID: event-service
    healthcheck: *actuator-healthcheck

  user-service:
    build:
      context: .
      dockerfile: core/user-service/Dockerfile
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      users-db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8091
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://users-db:5432/ewm-users
      SPRING_DATASOURCE_USERNAME: users
      SPRING_DATASOURCE_PASSWORD: users
    healthcheck: *actuator-healthcheck

  gateway-server:
    build:
      context: .
      dockerfile: infra/gateway-server/Dockerfile
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      event-service:
        condition: service_healthy
      request-service:
        condition: service_healthy
      feature-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    healthcheck: *actuator-healthcheck
