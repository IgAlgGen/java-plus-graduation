spring:
  application:
    name: stats-server
  cloud:
    config:
      enabled: false
  datasource:
    driver-class-name: org.h2.Driver
    url: "jdbc:h2:mem:stats"
    username: stats
    password: "${STATS_TEST_DB_PASSWORD:stats}"
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

server:
  port: 0

eureka:
  client:
    enabled: false
