spring:
  application:
    name: collector
  config:
    import: "optional:configserver:"
  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-server

eureka:
  client:
    service-url:
      defaultZone: "${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}"

server:
  port: 0

grpc:
  server:
    port: "${GRPC_SERVER_PORT:9090}"
